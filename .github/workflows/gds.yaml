name: gds

on:
  push:
  workflow_dispatch:

jobs:
  gds:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build GDS
        uses: pindakaasbot/tt-gds-action@ttihp26a-cmos5l
        with:
          pdk: sky130A

  precheck:
    needs: gds
    runs-on: ubuntu-24.04
    steps:
      - name: Run Tiny Tapeout Precheck
        uses: pindakaasbot/tt-gds-action/precheck@ttihp26a-cmos5l
        with:
          tools-repo: htfab/tt-support-tools
          tools-ref: cmos

  gl_test:
    needs: gds
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: GL test
        uses: pindakaasbot/tt-gds-action/gl_test@ttihp26a-cmos5l

  viewer:
    needs: gds
    runs-on: ubuntu-24.04
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    steps:
      - uses: pindakaasbot/tt-gds-action/viewer@ttihp26a-cmos5l
