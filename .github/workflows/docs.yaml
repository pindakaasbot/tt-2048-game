name: docs

on:
  push:
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build docs
        uses: pindakaasbot/tt-gds-action/docs@ttihp26a-cmos5l
        with:
          tools-repo: htfab/tt-support-tools
          tools-ref: cmos
